# Conda environment for AppliedMathThesis.
# Matches the versions pinned in requirements.txt / confirmed working
# locally and in CI (see .github/workflows/ci.yml).
#
# Create with:
#   conda env create -f environment.yml
#   conda activate applied-math-thesis
name: applied-math-thesis
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - numpy=2.4.6
  - scipy>=1.12
  - pandas>=2.2
  - matplotlib>=3.8
  - statsmodels>=0.14
  - scikit-learn>=1.4
  - pytest=9.0.3
  - mypy=2.1.0
  - ruff>=0.6
  - pip
  - pip:
      - -e .
